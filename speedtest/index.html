<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
	<title>网络测速 | LibreSpeed</title>
	<link href="/woznes.png" rel="icon" type="image/png"/>
	<script src="/utils/jquery-3.7.1.js"></script>
	<script src="/utils/bootstrap4.js"></script>
	<link href="/utils/bootstrap4.centos.css" rel="stylesheet">
	<link href="/utils/fontawesome.css" rel="stylesheet">
	<link rel="stylesheet" href="/common.css">
	<script src="/speedtest/speedtest.js"></script>
	<script>
		$("#ip-title").hide()
		$(document).ready(function () {
			$("#footer").load("/footer.html");
			$("#navibar").load("/navibar.html");
		});
	</script>
</head>
<body>
<div id="navibar"></div>

<header class="header header__page">

	<!--logo-->
<!--	<div class="container mb-5">-->
<!--		<a href="/"></a>-->
<!--	</div>-->

	<!--页面标题-->
	<h1 class="header__page__title">
		网络测速
	</h1>

	<!--副标题-->
	<p class="header__page__description">
		测试您的下载速度、上传速度、Ping 和抖动
	</p>
</header>

<div class="hr">
	<div class="hr__centos-color-0"></div>
	<div class="hr__centos-color-1"></div>
	<div class="hr__centos-color-2"></div>
	<div class="hr__centos-color-3"></div>
</div>

<main class="page">
	<article class="page__content">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<button id="startStopBtn" class="btn btn-primary btn-lg btn-block" onclick="startStop()">开始测速</button>
				<br>
			</div>
			<div class="col-md-6">
				<h5 id="ip-title">IP地址:</h5>
				<span id="ip"></span>
			</div>
		</div>
		<div class="row">
			<div class="col-md-3">
				<h5>下载速度</h5>
				<p>
					<span class="display-4 text-primary" id="dlText">0.00</span>
					<br>
					Mbps
				</p>
			</div>
			<div class="col-md-3">
				<h5>上传速度</h5>
				<p>
					<span class="display-4 text-success" id="ulText">0.00</span>
					<br>
					Mbps
				</p>
			</div>
			<div class="col-md-3">
				<h5>Ping</h5>
				<p>
					<span class="display-4 text-danger" id="pingText">0</span>
					<br>
					ms
				</p>
			</div>
			<div class="col-md-3">
				<h5>抖动</h5>
				<p>
					<span class="display-4 text-warning" id="jitText">0.00</span>
					<br>
					ms
				</p>
			</div>
		</div>
		<div class="row">
			<div class="alert alert-info col-12" role="alert">
				<h5 class="alert-heading">重要</h5>
				<h6>
					本测速页面结果代表当前网络环境与服务器网络环境的综合结果
					<br>
					不能完全代表当前网络状况
				</h6>
				<p>
					如发现任何bug或功能问题，请前往
					<a href="https://github.com/NickJi2019/Woznes-Home">
						<i class="fab fa-github"></i> Github
					</a>
					进行反馈
				</p>
			</div>
		</div>
	</article>
</main>

<div class="hr">
	<div class="hr__centos-color-0"></div>
	<div class="hr__centos-color-1"></div>
	<div class="hr__centos-color-2"></div>
	<div class="hr__centos-color-3"></div>
</div>

<div id="footer"></div>
<script>
	var s = new Speedtest();
	s.onupdate = function(data) {
		document.getElementById("ip-title").hidden = false;
		document.getElementById("ip").textContent = data.clientIp || "未知";
		document.getElementById("dlText").textContent = data.dlStatus || "0.00";
		document.getElementById("ulText").textContent = data.ulStatus || "0.00";
		document.getElementById("pingText").textContent = data.pingStatus || "0";
		document.getElementById("jitText").textContent = data.jitterStatus || "0";
	};
	s.onend = function() {
		document.getElementById("startStopBtn").disabled = false;
	};
	function startStop() {
		if (s.getState() == 3) {
			s.abort();
		} else {
			s.start();
			document.getElementById("startStopBtn").disabled = true;
		}
	}
</script>
</body>
</html>
